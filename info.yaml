# Tiny Tapeout project information
# Bootcamp Diseño y Fabricación de Chips - UTP 2026
# Reto: ALU de 7 bits con entrada serial y salida paralela

project:
  title:        "ALU 7 bits - Entrada Serial / Salida Paralela"
  author:       "Bootcamp IEEE OpenSilicon - IEEE CASS UTP 2026"
  discord:      ""         # Completar con usuario de Discord si aplica
  description:  "ALU de 7 bits con entrada serial (LSB primero). Soporta Suma, AND, OR, XOR y Resta. Protocolo: 7 bits op_A + 7 bits op_B + 3 bits opcode por flanco de CLK. Salida paralela en 8 bits + señal Done."
  language:     "Verilog"
  clock_hz:     50000000   # 50 MHz (frecuencia máxima estimada para SKY130)

  # Tile mínimo: 167x108 um. El diseño es compacto, 1x1 es suficiente.
  tiles: "1x1"

  # El módulo top-level debe comenzar con "tt_um_"
  top_module: "tt_um_alu7b"

  # Archivos fuente en ./src (listados individualmente)
  source_files:
    - "project.v"

# Descripción de pines para el datasheet y la página web de TinyTapeout
pinout:
  # ---- Entradas dedicadas ----
  ui[0]: "Bit_in - Dato de entrada serial (LSB primero: 7b op_A, 7b op_B, 3b opcode)"
  ui[1]: ""
  ui[2]: ""
  ui[3]: ""
  ui[4]: ""
  ui[5]: ""
  ui[6]: ""
  ui[7]: ""

  # ---- Salidas dedicadas ----
  uo[0]: "Data_out[0] - Resultado bit 0 (LSB)"
  uo[1]: "Data_out[1] - Resultado bit 1"
  uo[2]: "Data_out[2] - Resultado bit 2"
  uo[3]: "Data_out[3] - Resultado bit 3"
  uo[4]: "Data_out[4] - Resultado bit 4"
  uo[5]: "Data_out[5] - Resultado bit 5"
  uo[6]: "Data_out[6] - Resultado bit 6 (MSB operando)"
  uo[7]: "Data_out[7] - Carry / Borrow (extensión de signo para Suma y Resta)"

  # ---- Pines bidireccionales ----
  uio[0]: "Done - Pulso alto (1 ciclo CLK) cuando la operación ha finalizado"
  uio[1]: ""
  uio[2]: ""
  uio[3]: ""
  uio[4]: ""
  uio[5]: ""
  uio[6]: ""
  uio[7]: ""

# No modificar
yaml_version: 6